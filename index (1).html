<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playlist — Grupo Vocal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#e8e8e8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.wrapper{position:relative;border-radius:14px;overflow:visible;width:100%;max-width:860px;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.wallpaper{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0;border-radius:14px;pointer-events:none}
.wallpaper-overlay{position:absolute;inset:0;z-index:1;border-radius:14px;pointer-events:none}
.app{position:relative;z-index:2;display:grid;grid-template-columns:230px minmax(0,1fr);min-height:600px;border:0.5px solid rgba(0,0,0,0.12);border-radius:14px;overflow:hidden}

/* Sidebar */
.sidebar{background:#f5f5f3;border-right:0.5px solid #e0dfd8;display:flex;flex-direction:column}
.sidebar-header{padding:14px 16px;border-bottom:0.5px solid #e0dfd8;display:flex;align-items:center;justify-content:space-between;gap:8px}
.sidebar-title{font-size:13px;font-weight:600;color:#1a1a1a}
.btn{font-size:12px;padding:6px 12px;border:0.5px solid #ccc;border-radius:7px;background:#fff;cursor:pointer;font-family:inherit;color:#333;white-space:nowrap}
.btn:hover{background:#f0f0f0}
.pl-list{flex:1;overflow-y:auto;padding:6px}
.pl-item{padding:7px 9px;border-radius:8px;cursor:pointer;font-size:12px;color:#666;display:flex;align-items:center;gap:5px;margin-bottom:2px;transition:background 0.1s}
.pl-item:hover{background:#fff;color:#1a1a1a}
.pl-item.active{background:#fff;color:#1a1a1a;font-weight:600}
.pl-name-txt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-count{font-size:10px;color:#aaa;flex-shrink:0}
.pl-menu-btn{background:none;border:none;cursor:pointer;font-size:14px;color:#bbb;padding:1px 5px;border-radius:5px;line-height:1;opacity:0;flex-shrink:0}
.pl-item:hover .pl-menu-btn,.pl-item.active .pl-menu-btn{opacity:1}
.pl-menu-btn:hover{background:#eee;color:#555}

/* Main */
.main{display:flex;flex-direction:column;background:#fff}
.main-header{padding:14px 16px 10px;border-bottom:0.5px solid #e8e8e8}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px}
.group-name-disp{font-size:19px;font-weight:600;color:#1a1a1a;flex:1;border-radius:6px;padding:2px 5px;margin:-2px -5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.group-name-disp.editable{cursor:pointer;transition:background 0.1s}
.group-name-disp.editable:hover{background:#f5f5f5}
.group-name-input{font-size:19px;font-weight:600;color:#1a1a1a;border:none;background:#f5f5f5;outline:none;border-radius:6px;padding:2px 5px;width:100%;font-family:inherit}
.pl-title-row{display:flex;align-items:center;gap:6px}
.pl-title-label{font-size:11px;color:#aaa;flex-shrink:0}
.pl-title-disp{font-size:12px;font-weight:500;color:#888;flex:1;border-radius:4px;padding:1px 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-title-disp.editable{cursor:pointer;transition:background 0.1s}
.pl-title-disp.editable:hover{background:#f5f5f5;color:#333}
.pl-title-input{font-size:12px;font-weight:500;border:none;background:#f5f5f5;outline:none;border-radius:4px;padding:1px 4px;width:100%;font-family:inherit;color:#333}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.header-menu-btn{background:none;border:0.5px solid #ccc;cursor:pointer;font-size:16px;padding:3px 10px;border-radius:7px;color:#888;line-height:1}
.header-menu-btn:hover{background:#f5f5f5}

/* Hambúrguer — só aparece no mobile */
.hamburger-btn{display:none;background:none;border:0.5px solid #ccc;cursor:pointer;font-size:18px;padding:3px 9px;border-radius:7px;color:#888;line-height:1;flex-shrink:0}
.hamburger-btn:hover{background:#f5f5f5}

.visitor-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;background:#f0f7ff;color:#1a56aa;border:0.5px solid #b8d4f5;border-radius:20px;padding:4px 12px;font-weight:500}

.add-area{padding:10px 16px;border-bottom:0.5px solid #e8e8e8;display:flex;gap:7px}
.add-input{flex:1;font-size:12px;padding:7px 10px;border:0.5px solid #ccc;border-radius:7px;outline:none;font-family:inherit;color:#333}
.add-input:focus{border-color:#888}
.track-list{flex:1;overflow-y:auto;padding:6px 10px}
.track{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;border:0.5px solid transparent;margin-bottom:3px;cursor:pointer;transition:background 0.1s}
.track:hover{background:#f7f7f5}
.track.playing{background:#f0f0ee;border-color:#ddd}
.track-num{font-size:11px;color:#bbb;min-width:18px;text-align:center;flex-shrink:0}
.track-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.icon-yt{background:#FCEBEB;color:#A32D2D}
.icon-sp{background:#EAF3DE;color:#27500A}
.icon-other{background:#EEEDFE;color:#3C3489}
.track-name{flex:1;font-size:13px;font-weight:500;color:#1a1a1a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.menu-btn{background:none;border:none;cursor:pointer;font-size:15px;color:#ccc;padding:2px 6px;border-radius:6px;flex-shrink:0;line-height:1}
.menu-btn:hover{background:#eee;color:#555}
.empty{text-align:center;padding:40px 16px;color:#bbb;font-size:12px}

.player-bar{padding:10px 16px;border-top:0.5px solid #e8e8e8;display:flex;align-items:center;gap:12px}
.now-info{flex:1;overflow:hidden}
.now-playing{font-size:11px;color:#aaa}
.now-title{font-size:13px;font-weight:600;color:#1a1a1a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.controls{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ctrl-btn{font-size:12px;padding:6px 12px;border:0.5px solid #ccc;border-radius:7px;background:#f5f5f5;cursor:pointer;font-family:inherit;color:#333;white-space:nowrap}
.ctrl-btn:hover{background:#eee}
.ctrl-btn.primary{background:#cc0000;color:#fff;border-color:#cc0000;font-weight:500}
.ctrl-btn.primary:hover{background:#aa0000}

/* Player flutuante */
.yt-modal{display:none;position:absolute;inset:0;z-index:300;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);border-radius:14px}
.yt-modal.open{display:flex}
.yt-box{background:#0f0f0f;border-radius:12px;overflow:hidden;width:92%;max-width:560px;box-shadow:0 12px 50px rgba(0,0,0,0.7)}
.yt-box-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#1a1a1a;gap:10px}
.yt-box-title{font-size:13px;font-weight:500;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.yt-box-controls{display:flex;gap:6px;flex-shrink:0}
.yt-ctrl{background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:12px;padding:5px 10px;border-radius:6px;cursor:pointer;font-family:inherit;white-space:nowrap}
.yt-ctrl:hover{background:rgba(255,255,255,0.2)}
.yt-ctrl.close-btn{background:#cc0000}
.yt-ctrl.close-btn:hover{background:#aa0000}
.yt-content{padding:16px;display:flex;flex-direction:column;gap:12px}
.yt-open-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:#FF0000;color:#fff;font-size:14px;font-weight:600;padding:12px 20px;border-radius:8px;text-decoration:none;font-family:inherit}
.yt-open-btn:hover{background:#cc0000}
.yt-frame-wrap{width:100%;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:#000}
.yt-frame-wrap iframe{width:100%;height:100%;border:none;display:block}
.yt-sp-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:#1DB954;color:#fff;font-size:14px;font-weight:600;padding:12px 20px;border-radius:8px;text-decoration:none;font-family:inherit}

/* Drawer mobile para sidebar */
.sidebar-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.4);z-index:50;border-radius:14px}
.sidebar-overlay.open{display:block}
.sidebar-drawer{position:absolute;top:0;left:0;bottom:0;width:260px;z-index:51;border-radius:14px 0 0 14px;transform:translateX(-100%);transition:transform 0.25s ease;display:flex;flex-direction:column;background:#f5f5f3;border-right:0.5px solid #e0dfd8}
.sidebar-drawer.open{transform:translateX(0)}
.drawer-header{padding:14px 16px;border-bottom:0.5px solid #e0dfd8;display:flex;align-items:center;justify-content:space-between;gap:8px}
.drawer-close{background:none;border:none;cursor:pointer;font-size:20px;color:#888;line-height:1;padding:2px 6px}

/* Dropdown */
.dropdown{position:absolute;background:#fff;border:0.5px solid #ddd;border-radius:10px;z-index:1000;min-width:210px;padding:4px;display:none;box-shadow:0 4px 20px rgba(0,0,0,0.15)}
.dropdown.open{display:block}
.dd-item{padding:8px 12px;font-size:13px;color:#1a1a1a;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:8px}
.dd-item:hover{background:#f5f5f5}
.dd-item.danger{color:#cc0000}
.dd-item.danger:hover{background:#FEF2F2}
.dd-sep{height:0.5px;background:#eee;margin:3px 0}

/* Modal */
.modal-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.45);z-index:500;align-items:center;justify-content:center;border-radius:14px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;border:0.5px solid #ddd;padding:20px;width:320px;display:flex;flex-direction:column;gap:14px;box-shadow:0 8px 40px rgba(0,0,0,0.18)}
.modal h3{font-size:15px;font-weight:600;color:#1a1a1a}
.modal input[type=text]{width:100%;font-size:13px;padding:8px 10px;border:0.5px solid #ccc;border-radius:7px;outline:none;font-family:inherit;color:#1a1a1a}
.modal input[type=text]:focus{border-color:#888}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}

/* Wallpaper panel — sem blur, só escurecimento */
.wp-panel{display:flex;flex-direction:column;gap:12px}
.wp-preview{width:100%;height:90px;border-radius:8px;border:0.5px solid #ddd;background:#e8e8e8;background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:12px;color:#aaa}
.wp-presets{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.wp-preset{height:52px;border-radius:8px;cursor:pointer;border:2px solid transparent;display:flex;align-items:flex-end;padding:4px;transition:border-color 0.15s;background-size:cover;background-position:center}
.wp-preset:hover{border-color:#888}
.wp-preset.selected{border-color:#534AB7}
.wp-preset-label{font-size:9px;color:#fff;background:rgba(0,0,0,0.55);border-radius:3px;padding:1px 5px}
.wp-upload-btn{width:100%;font-size:12px;padding:8px;border:0.5px solid #ccc;border-radius:7px;background:#f5f5f5;cursor:pointer;font-family:inherit;color:#333}
.wp-upload-btn:hover{background:#eee}
.wp-remove{font-size:12px;color:#cc0000;cursor:pointer;text-align:center;padding:2px}
.dim-row{display:flex;align-items:center;gap:8px;font-size:12px;color:#666}
.dim-row input[type=range]{flex:1}
.dim-note{font-size:11px;color:#999;font-style:italic}

/* has-bg — SEM backdrop-filter blur */
.has-bg .sidebar{background:rgba(0,0,0,0.55)!important;border-right-color:rgba(255,255,255,0.1)!important}
.has-bg .main{background:rgba(0,0,0,0.40)!important}
.has-bg .sidebar-header,.has-bg .main-header,.has-bg .add-area,.has-bg .player-bar{border-color:rgba(255,255,255,0.1)!important}
.has-bg .sidebar-title,.has-bg .group-name-disp,.has-bg .track-name,.has-bg .now-title{color:#fff!important}
.has-bg .pl-title-disp,.has-bg .pl-title-label{color:rgba(255,255,255,0.6)!important}
.has-bg .pl-count,.has-bg .track-num,.has-bg .now-playing{color:rgba(255,255,255,0.5)!important}
.has-bg .pl-item{color:rgba(255,255,255,0.75)}
.has-bg .pl-item:hover,.has-bg .pl-item.active{background:rgba(255,255,255,0.15)!important;color:#fff!important}
.has-bg .track:hover,.has-bg .track.playing{background:rgba(255,255,255,0.12)!important;border-color:rgba(255,255,255,0.2)!important}
.has-bg .group-name-disp.editable:hover,.has-bg .pl-title-disp.editable:hover{background:rgba(255,255,255,0.1)!important}
.has-bg .group-name-input,.has-bg .pl-title-input{background:rgba(255,255,255,0.15)!important;color:#fff!important}
.has-bg .menu-btn,.has-bg .pl-menu-btn,.has-bg .header-menu-btn,.has-bg .hamburger-btn{color:rgba(255,255,255,0.6)!important;border-color:rgba(255,255,255,0.2)!important}
.has-bg .menu-btn:hover,.has-bg .pl-menu-btn:hover,.has-bg .header-menu-btn:hover,.has-bg .hamburger-btn:hover{background:rgba(255,255,255,0.15)!important;color:#fff!important}
.has-bg .add-input{background:rgba(255,255,255,0.12)!important;color:#fff!important;border-color:rgba(255,255,255,0.2)!important}
.has-bg .add-input::placeholder{color:rgba(255,255,255,0.4)!important}
.has-bg .btn,.has-bg .ctrl-btn{background:rgba(255,255,255,0.15)!important;color:#fff!important;border-color:rgba(255,255,255,0.25)!important}
.has-bg .ctrl-btn.primary{background:#cc0000!important;border-color:#cc0000!important}
.has-bg .empty{color:rgba(255,255,255,0.4)!important}
.has-bg .app{border-color:rgba(255,255,255,0.15)!important}
.has-bg .visitor-badge{background:rgba(255,255,255,0.15);color:#fff;border-color:rgba(255,255,255,0.3)}
.has-bg .drawer-header{border-color:rgba(255,255,255,0.1)!important}
.has-bg .drawer-close{color:rgba(255,255,255,0.7)!important}
.has-bg .sidebar-drawer{background:rgba(0,0,0,0.75)!important}

/* Mobile */
@media(max-width:640px){
  body{padding:0}
  .wrapper{border-radius:0;max-width:100%;box-shadow:none}
  .wallpaper,.wallpaper-overlay,.app,.yt-modal,.sidebar-overlay,.sidebar-drawer,.modal-overlay{border-radius:0}
  .app{grid-template-columns:1fr;min-height:100vh}
  .sidebar{display:none}
  .hamburger-btn{display:block}
  .sidebar-drawer{border-radius:0 0 0 0}
}
</style>
</head>
<body>
<div class="wrapper" id="wrapper">
  <div class="wallpaper" id="wallpaper"></div>
  <div class="wallpaper-overlay" id="wallpaperOverlay"></div>
  <div class="app" id="app">

    <!-- Sidebar desktop -->
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Playlists</span>
        <button class="btn" id="btnNovaPl" onclick="openNewPl()" style="display:none">+ Nova</button>
      </div>
      <div class="pl-list" id="plList"></div>
    </div>

    <!-- Main -->
    <div class="main">
      <div class="main-header">
        <div class="header-top">
          <!-- Hambúrguer mobile -->
          <button class="hamburger-btn" onclick="openDrawer()">☰</button>
          <div id="groupNameWrap" style="flex:1;min-width:0">
            <div class="group-name-disp" id="groupNameDisp">Meu Grupo Vocal</div>
          </div>
          <div class="header-right" id="headerRight"></div>
        </div>
        <div class="pl-title-row">
          <span class="pl-title-label">Playlist:</span>
          <div id="plTitleWrap" style="flex:1;min-width:0">
            <div class="pl-title-disp" id="plTitleDisp"></div>
          </div>
        </div>
      </div>
      <div class="add-area" id="addArea" style="display:none">
        <input class="add-input" id="urlInput" placeholder="Cole um link do YouTube ou Spotify..." onkeydown="if(event.key==='Enter')addTrack()">
        <button class="btn" onclick="addTrack()">Adicionar</button>
      </div>
      <div class="track-list" id="trackList"></div>
      <div class="player-bar">
        <div class="now-info">
          <div class="now-playing" id="nowPlaying">Selecione uma faixa para tocar</div>
          <div class="now-title" id="nowTitle" style="display:none"></div>
        </div>
        <div class="controls">
          <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
          <button class="ctrl-btn primary" onclick="openPlayer()">▶ Tocar</button>
          <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Drawer mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeDrawer()"></div>
  <div class="sidebar-drawer" id="sidebarDrawer">
    <div class="drawer-header">
      <span class="sidebar-title">Playlists</span>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn" id="btnNovaPlDrawer" onclick="openNewPl()" style="display:none">+ Nova</button>
        <button class="drawer-close" onclick="closeDrawer()">×</button>
      </div>
    </div>
    <div class="pl-list" id="plListDrawer"></div>
  </div>

  <!-- Player flutuante -->
  <div class="yt-modal" id="ytModal">
    <div class="yt-box">
      <div class="yt-box-header">
        <span class="yt-box-title" id="ytBoxTitle"></span>
        <div class="yt-box-controls">
          <button class="yt-ctrl" onclick="prevTrackPlayer()">⏮</button>
          <button class="yt-ctrl" onclick="nextTrackPlayer()">⏭</button>
          <button class="yt-ctrl close-btn" onclick="closePlayer()">✕</button>
        </div>
      </div>
      <div class="yt-content" id="ytContent"></div>
    </div>
  </div>

  <div id="dropdown" class="dropdown"></div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle"></h3>
      <div id="modalBody"></div>
      <div class="modal-btns" id="modalBtns"></div>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileUpload(event)">

<script>
/* ══ SENHA DO ADMIN — altere aqui ══ */
var ADMIN_PASSWORD = 'maanaim2024';

var isAdmin = (function(){
  var p = new URLSearchParams(window.location.search);
  return p.get('admin') === ADMIN_PASSWORD;
})();

var state = {
  groupName:'Meu Grupo Vocal',
  playlists:[{id:1,name:'Playlist 1',tracks:[]}],
  currentPl:1, currentTrack:null, nextId:10,
  wallpaper:null, wallpaperDim:40
};
var presets=[
  {label:'Coral',   color:'linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)'},
  {label:'Palco',   color:'linear-gradient(135deg,#2d1b4e,#1a1a2e,#4a1942)'},
  {label:'Noturno', color:'linear-gradient(135deg,#0d1117,#1c2333,#0d1117)'},
  {label:'Aurora',  color:'linear-gradient(135deg,#003366,#004e92,#000428)'},
  {label:'Veludo',  color:'linear-gradient(135deg,#1a0a2e,#3d1c52,#1a0a2e)'},
  {label:'Crepusc.',color:'linear-gradient(135deg,#2c1810,#8b3a1c,#2c1810)'}
];
var modalMode=null, selectedPreset=null, tempWpData=null, tempDim=null;

function getYTId(u){if(!u)return null;var m=u.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:null;}
function getType(u){if(!u)return'other';if(u.includes('youtube.com')||u.includes('youtu.be'))return'yt';if(u.includes('spotify.com'))return'sp';return'other';}
function typeIcon(t){return t==='yt'?'▶':t==='sp'?'♪':'♬';}
function typeLabel(t){return t==='yt'?'YouTube':t==='sp'?'Spotify':'Link';}
function currentPl(){return state.playlists.find(function(p){return p.id===state.currentPl;})||state.playlists[0];}
function saveState(){try{localStorage.setItem('vgp5',JSON.stringify(state));}catch(e){}}
function loadState(){try{var s=localStorage.getItem('vgp5');if(s)state=JSON.parse(s);}catch(e){}}

/* ── Drawer mobile ── */
function openDrawer(){
  document.getElementById('sidebarOverlay').classList.add('open');
  document.getElementById('sidebarDrawer').classList.add('open');
}
function closeDrawer(){
  document.getElementById('sidebarOverlay').classList.remove('open');
  document.getElementById('sidebarDrawer').classList.remove('open');
}

/* ── Modo admin/visitante ── */
function applyMode(){
  var isAdm = isAdmin;
  document.getElementById('btnNovaPl').style.display = isAdm?'':'none';
  document.getElementById('btnNovaPlDrawer').style.display = isAdm?'':'none';
  document.getElementById('addArea').style.display = isAdm?'':'none';
  var gnd = document.getElementById('groupNameDisp');
  if(isAdm){gnd.classList.add('editable');gnd.title='Clique para editar';gnd.onclick=startEditGroup;}
  else{gnd.classList.remove('editable');gnd.onclick=null;}
  var ptd = document.getElementById('plTitleDisp');
  if(isAdm){ptd.classList.add('editable');ptd.title='Clique para editar';ptd.onclick=startEditPl;}
  else{ptd.classList.remove('editable');ptd.onclick=null;}
  var hr = document.getElementById('headerRight');
  if(isAdm){hr.innerHTML='<button class="header-menu-btn" onclick="openAppMenu(event)">···</button>';}
  else{hr.innerHTML='<span class="visitor-badge">👁 Visualização</span>';}
}

/* ── Wallpaper — SEM blur ── */
function applyWallpaper(){
  var wp=document.getElementById('wallpaper');
  var ov=document.getElementById('wallpaperOverlay');
  var app=document.getElementById('app');
  if(!state.wallpaper){
    wp.style.cssText='position:absolute;inset:0;z-index:0;border-radius:inherit;pointer-events:none';
    ov.style.cssText='position:absolute;inset:0;z-index:1;border-radius:inherit;pointer-events:none';
    app.classList.remove('has-bg');
    return;
  }
  /* Sem blur — apenas a imagem limpa */
  if(state.wallpaper.startsWith('linear-gradient')){
    wp.style.cssText='position:absolute;inset:0;z-index:0;border-radius:inherit;pointer-events:none;background:'+state.wallpaper+';background-size:cover;background-position:center';
  }else{
    wp.style.cssText='position:absolute;inset:0;z-index:0;border-radius:inherit;pointer-events:none;background-image:url("'+state.wallpaper+'");background-size:cover;background-position:center';
  }
  /* Overlay de escurecimento ajustável */
  var d = state.wallpaperDim / 100;
  ov.style.cssText='position:absolute;inset:0;z-index:1;border-radius:inherit;pointer-events:none;background:rgba(0,0,0,'+d+')';
  app.classList.add('has-bg');
}

/* ── Player ── */
function openPlayer(){
  var tracks=currentPl().tracks;if(!tracks.length)return;
  if(!state.currentTrack)state.currentTrack=tracks[0].id;
  loadPlayerTrack();
  document.getElementById('ytModal').classList.add('open');
}
function closePlayer(){
  document.getElementById('ytModal').classList.remove('open');
  document.getElementById('ytContent').innerHTML='';
}
function loadPlayerTrack(){
  var t=currentPl().tracks.find(function(t){return t.id===state.currentTrack;});if(!t)return;
  document.getElementById('ytBoxTitle').textContent=t.name;
  renderTrackList();renderPlayer();
  var ytId=getYTId(t.url);
  var c=document.getElementById('ytContent');
  if(ytId){
    c.innerHTML='<a class="yt-open-btn" href="https://www.youtube.com/watch?v='+ytId+'" target="_blank">▶ Abrir no YouTube</a>'+
      '<div class="yt-frame-wrap"><iframe src="https://www.youtube.com/embed/'+ytId+'?autoplay=1&rel=0&modestbranding=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>';
  }else if(t.url.includes('spotify.com')){
    c.innerHTML='<a class="yt-sp-btn" href="'+t.url+'" target="_blank">♪ Abrir no Spotify</a>';
  }else{
    c.innerHTML='<a class="yt-open-btn" href="'+t.url+'" target="_blank">↗ Abrir link</a>';
  }
}
function prevTrackPlayer(){var tracks=currentPl().tracks;if(!tracks.length)return;var i=tracks.findIndex(function(t){return t.id===state.currentTrack;});state.currentTrack=(i<=0?tracks[tracks.length-1]:tracks[i-1]).id;loadPlayerTrack();saveState();}
function nextTrackPlayer(){var tracks=currentPl().tracks;if(!tracks.length)return;var i=tracks.findIndex(function(t){return t.id===state.currentTrack;});state.currentTrack=(i>=tracks.length-1?tracks[0]:tracks[i+1]).id;loadPlayerTrack();saveState();}

/* ── Edição inline ── */
function startEditGroup(){
  if(!isAdmin)return;
  var wrap=document.getElementById('groupNameWrap');
  wrap.innerHTML='<input class="group-name-input" id="groupInput" value="'+state.groupName.replace(/"/g,'&quot;')+'" '+
    'onblur="saveGroup()" onkeydown="if(event.key===\'Enter\'){this.blur();}if(event.key===\'Escape\')cancelEditGroup()">';
  var inp=document.getElementById('groupInput');inp.focus();inp.select();
}
function saveGroup(){
  var inp=document.getElementById('groupInput');
  if(inp&&inp.value.trim())state.groupName=inp.value.trim();
  cancelEditGroup();saveState();
}
function cancelEditGroup(){
  var wrap=document.getElementById('groupNameWrap');
  var cls='group-name-disp'+(isAdmin?' editable':'');
  var oc=isAdmin?' onclick="startEditGroup()" title="Clique para editar"':'';
  wrap.innerHTML='<div class="'+cls+'" id="groupNameDisp"'+oc+'>'+state.groupName+'</div>';
}

function startEditPl(){
  if(!isAdmin)return;
  var pl=currentPl();
  var wrap=document.getElementById('plTitleWrap');
  wrap.innerHTML='<input class="pl-title-input" id="plInput" value="'+pl.name.replace(/"/g,'&quot;')+'" '+
    'onblur="savePl()" onkeydown="if(event.key===\'Enter\'){this.blur();}if(event.key===\'Escape\')cancelEditPl()">';
  var inp=document.getElementById('plInput');inp.focus();inp.select();
}
function savePl(){
  var inp=document.getElementById('plInput');
  if(inp&&inp.value.trim()){currentPl().name=inp.value.trim();renderSidebar();}
  cancelEditPl();saveState();
}
function cancelEditPl(){
  var wrap=document.getElementById('plTitleWrap');
  var cls='pl-title-disp'+(isAdmin?' editable':'');
  var oc=isAdmin?' onclick="startEditPl()" title="Clique para editar"':'';
  wrap.innerHTML='<div class="'+cls+'" id="plTitleDisp"'+oc+'>'+currentPl().name+'</div>';
}

/* ── Menu dropdown ── */
function openMenu(e,items){
  if(!isAdmin)return;
  e.stopPropagation();
  var dd=document.getElementById('dropdown');
  dd.innerHTML=items.map(function(it){
    return it==='sep'?'<div class="dd-sep"></div>':
      '<div class="dd-item'+(it.danger?' danger':'')+'" onclick="('+it.fn+')()">'+it.icon+' '+it.label+'</div>';
  }).join('');
  dd.classList.add('open');
  var wR=document.getElementById('wrapper').getBoundingClientRect();
  var bR=e.currentTarget.getBoundingClientRect();
  var top=bR.bottom-wR.top+4;
  var left=bR.right-wR.left-214;
  if(left<8)left=8;
  dd.style.top=top+'px';dd.style.left=left+'px';
  requestAnimationFrame(function(){
    var dW=dd.offsetWidth;
    var l=bR.right-wR.left-dW;
    if(l<8)l=8;
    if(l+dW>wR.width-8)l=wR.width-dW-8;
    dd.style.left=l+'px';
  });
}
function closeMenu(){document.getElementById('dropdown').classList.remove('open');}
document.addEventListener('click',function(e){
  var dd=document.getElementById('dropdown');
  if(dd.classList.contains('open')&&!dd.contains(e.target))closeMenu();
});

function openAppMenu(e){
  if(!isAdmin)return;
  var hasWp=!!state.wallpaper;
  var items=[{icon:'🖼',label:'Papel de parede',fn:'function(){closeMenu();openWpModal()}'}];
  if(hasWp){items.push('sep');items.push({icon:'✕',label:'Remover fundo',danger:true,fn:'function(){closeMenu();removeBg()}'});}
  items.push('sep');
  items.push({icon:'↓',label:'Exportar playlists (.txt)',fn:'function(){closeMenu();downloadTXT()}'});
  items.push({icon:'↓',label:'Exportar playlists (.json)',fn:'function(){closeMenu();downloadJSON()}'});
  openMenu(e,items);
}
function openPlMenu(e,plId){
  if(!isAdmin)return;
  openMenu(e,[
    {icon:'✏',label:'Renomear',fn:'function(){closeMenu();openRenameModal("pl",'+plId+')}'},
    'sep',
    {icon:'↑',label:'Mover para cima',fn:'function(){closeMenu();movePl('+plId+',-1)}'},
    {icon:'↓',label:'Mover para baixo',fn:'function(){closeMenu();movePl('+plId+',1)}'},
    'sep',
    {icon:'✕',label:'Excluir',danger:true,fn:'function(){closeMenu();deletePl('+plId+')}'}
  ]);
}
function openTrackMenu(e,trackId){
  if(!isAdmin)return;
  openMenu(e,[
    {icon:'✏',label:'Renomear faixa',fn:'function(){closeMenu();openRenameModal("track",'+trackId+')}'},
    'sep',
    {icon:'↑',label:'Mover para cima',fn:'function(){closeMenu();moveTrack('+trackId+',-1)}'},
    {icon:'↓',label:'Mover para baixo',fn:'function(){closeMenu();moveTrack('+trackId+',1)}'},
    'sep',
    {icon:'✕',label:'Remover',danger:true,fn:'function(){closeMenu();deleteTrack('+trackId+')}'}
  ]);
}

/* ── Modais de renomear (corrigidos) ── */
function openRenameModal(tipo, id){
  if(!isAdmin)return;
  var currentVal = '';
  var title = '';
  if(tipo==='pl'){
    var pl=state.playlists.find(function(p){return p.id===id;});
    if(!pl)return;
    currentVal=pl.name;
    title='Renomear playlist';
  } else if(tipo==='track'){
    var t=currentPl().tracks.find(function(t){return t.id===id;});
    if(!t)return;
    currentVal=t.name;
    title='Renomear faixa';
  } else if(tipo==='newPl'){
    title='Nova playlist';
  }
  modalMode={tipo:tipo, id:id};
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=
    '<input type="text" id="modalInput" value="'+currentVal.replace(/"/g,'&quot;')+'" placeholder="'+title+'">';
  document.getElementById('modalBtns').innerHTML=
    '<button class="btn" onclick="closeModal()">Cancelar</button>'+
    '<button class="btn" style="background:#1a1a1a;color:#fff;border-color:#1a1a1a" onclick="confirmRenameModal()">Confirmar</button>';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(function(){
    var inp=document.getElementById('modalInput');
    if(inp){
      inp.focus();inp.select();
      inp.onkeydown=function(e){if(e.key==='Enter')confirmRenameModal();if(e.key==='Escape')closeModal();};
    }
  },50);
}

function confirmRenameModal(){
  var inp=document.getElementById('modalInput');
  if(!inp)return;
  var val=inp.value.trim();
  if(!val)return;
  var m=modalMode;
  if(m.tipo==='newPl'){
    var id=++state.nextId;
    state.playlists.push({id:id,name:val,tracks:[]});
    state.currentPl=id;
    render();
  } else if(m.tipo==='pl'){
    var pl=state.playlists.find(function(p){return p.id===m.id;});
    if(pl){pl.name=val;render();}
  } else if(m.tipo==='track'){
    var t=currentPl().tracks.find(function(t){return t.id===m.id;});
    if(t){t.name=val;renderTrackList();}
  }
  closeModal();saveState();
}

function openNewPl(){
  if(!isAdmin)return;
  openRenameModal('newPl', null);
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  modalMode=null;
}

/* ── Wallpaper modal ── */
function openWpModal(){
  if(!isAdmin)return;
  modalMode='wallpaper';selectedPreset=null;tempWpData=state.wallpaper;tempDim=state.wallpaperDim;
  document.getElementById('modalTitle').textContent='Papel de parede';
  document.getElementById('modalBtns').innerHTML=
    '<button class="btn" onclick="closeModal()">Cancelar</button>'+
    '<button class="btn" style="background:#1a1a1a;color:#fff;border-color:#1a1a1a" onclick="applyWpModal()">Aplicar</button>';
  var ps='';
  if(state.wallpaper){
    ps=state.wallpaper.startsWith('linear-gradient')
      ?'background:'+state.wallpaper+';background-size:cover;background-position:center'
      :'background-image:url("'+state.wallpaper+'");background-size:cover;background-position:center';
  }
  document.getElementById('modalBody').innerHTML=
    '<div class="wp-panel">'+
    '<div class="wp-preview" id="wpPreview" style="'+ps+'">'+(state.wallpaper?'':'Nenhuma imagem selecionada')+'</div>'+
    '<div class="dim-row">'+
      '<span>Escurecimento</span>'+
      '<input type="range" id="dimSlider" min="0" max="85" step="5" value="'+tempDim+'" oninput="updateDimPreview(this.value)">'+
      '<span id="dimVal">'+tempDim+'%</span>'+
    '</div>'+
    '<p class="dim-note">0% = imagem original · 85% = muito escuro</p>'+
    '<div style="font-size:11px;color:#888;margin-top:4px">Temas prontos</div>'+
    '<div class="wp-presets" id="wpPresets"></div>'+
    '<button class="wp-upload-btn" onclick="document.getElementById(\'fileInput\').click()">📁 Escolher foto do grupo</button>'+
    (state.wallpaper?'<div class="wp-remove" onclick="removeBg()">✕ Remover papel de parede</div>':'')+
    '</div>';
  renderPresets();
  document.getElementById('modalOverlay').classList.add('open');
}
function renderPresets(){
  var el=document.getElementById('wpPresets');if(!el)return;
  el.innerHTML=presets.map(function(p,i){
    return'<div class="wp-preset'+(selectedPreset===i?' selected':'')+'" style="background:'+p.color+'" onclick="selectPreset('+i+')">'+
      '<span class="wp-preset-label">'+p.label+'</span></div>';
  }).join('');
}
function selectPreset(i){
  selectedPreset=i;tempWpData=presets[i].color;
  var prev=document.getElementById('wpPreview');
  if(prev){prev.style.cssText='background:'+presets[i].color+';background-size:cover;background-position:center';prev.textContent='';}
  renderPresets();
}
function updateDimPreview(v){
  tempDim=parseInt(v);
  document.getElementById('dimVal').textContent=v+'%';
}
function handleFileUpload(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    tempWpData=ev.target.result;selectedPreset=null;
    var prev=document.getElementById('wpPreview');
    if(prev){prev.style.cssText='background-image:url("'+tempWpData+'");background-size:cover;background-position:center';prev.textContent='';}
    renderPresets();
  };
  reader.readAsDataURL(file);e.target.value='';
}
function removeBg(){state.wallpaper=null;state.wallpaperDim=40;applyWallpaper();saveState();closeModal();}
function applyWpModal(){
  if(tempWpData!==null)state.wallpaper=tempWpData;
  state.wallpaperDim=tempDim!==null?tempDim:state.wallpaperDim;
  applyWallpaper();saveState();closeModal();
}

/* ── CRUD ── */
function movePl(id,dir){if(!isAdmin)return;var arr=state.playlists,i=arr.findIndex(function(p){return p.id===id;}),j=i+dir;if(j<0||j>=arr.length)return;var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;render();saveState();}
function deletePl(id){if(!isAdmin)return;if(state.playlists.length===1)return;state.playlists=state.playlists.filter(function(p){return p.id!==id;});if(state.currentPl===id)state.currentPl=state.playlists[0].id;render();saveState();}
function moveTrack(id,dir){if(!isAdmin)return;var tracks=currentPl().tracks,i=tracks.findIndex(function(t){return t.id===id;}),j=i+dir;if(j<0||j>=tracks.length)return;var tmp=tracks[i];tracks[i]=tracks[j];tracks[j]=tmp;renderTrackList();saveState();}
function deleteTrack(id){if(!isAdmin)return;var pl=currentPl();pl.tracks=pl.tracks.filter(function(t){return t.id!==id;});if(state.currentTrack===id)state.currentTrack=null;renderTrackList();renderPlayer();saveState();}
function addTrack(){
  if(!isAdmin)return;
  var input=document.getElementById('urlInput');
  var url=input.value.trim();if(!url)return;
  var tp=getType(url);
  var name=tp==='yt'?'Musica do YouTube':tp==='sp'?'Faixa do Spotify':'Faixa';
  currentPl().tracks.push({id:++state.nextId,name:name,url:url});
  input.value='';renderTrackList();renderSidebar();saveState();
}

/* ── Render ── */
function renderSidebarContent(listId){
  var html=state.playlists.map(function(p){
    var mb=isAdmin?'<button class="pl-menu-btn" onclick="event.stopPropagation();openPlMenu(event,'+p.id+')">···</button>':'';
    return'<div class="pl-item'+(p.id===state.currentPl?' active':'')+'" onclick="selectPl('+p.id+')">'+
      '<span class="pl-name-txt">'+p.name+'</span>'+
      '<span class="pl-count">'+p.tracks.length+'</span>'+mb+'</div>';
  }).join('');
  document.getElementById(listId).innerHTML=html;
}
function renderSidebar(){
  renderSidebarContent('plList');
  renderSidebarContent('plListDrawer');
}
function renderTrackList(){
  var pl=currentPl();var tl=document.getElementById('trackList');
  if(!pl.tracks.length){
    tl.innerHTML='<div class="empty">'+(isAdmin?'Cole um link acima para adicionar faixas.':'Nenhuma faixa nesta playlist ainda.')+'</div>';
    return;
  }
  tl.innerHTML=pl.tracks.map(function(t,i){
    var tp=getType(t.url);
    var mb=isAdmin?'<button class="menu-btn" onclick="event.stopPropagation();openTrackMenu(event,'+t.id+')">···</button>':'';
    return'<div class="track'+(state.currentTrack===t.id?' playing':'')+'" onclick="selectTrack('+t.id+')">'+
      '<span class="track-num">'+(i+1)+'</span>'+
      '<div class="track-icon icon-'+tp+'">'+typeIcon(tp)+'</div>'+
      '<span class="track-name">'+t.name+'</span>'+mb+'</div>';
  }).join('');
}
function renderPlayer(){
  var t=currentPl().tracks.find(function(t){return t.id===state.currentTrack;});
  var np=document.getElementById('nowPlaying'),nt=document.getElementById('nowTitle');
  if(t){np.textContent='Selecionada: '+typeLabel(getType(t.url));nt.textContent=t.name;nt.style.display='block';}
  else{np.textContent='Selecione uma faixa para tocar';nt.style.display='none';}
}
function render(){renderSidebar();cancelEditGroup();cancelEditPl();renderTrackList();renderPlayer();applyMode();}
function selectPl(id){state.currentPl=id;state.currentTrack=null;closePlayer();closeDrawer();render();saveState();}
function selectTrack(id){state.currentTrack=id;renderTrackList();renderPlayer();saveState();}
function prevTrack(){var tracks=currentPl().tracks;if(!tracks.length)return;var i=tracks.findIndex(function(t){return t.id===state.currentTrack;});state.currentTrack=(i<=0?tracks[tracks.length-1]:tracks[i-1]).id;renderTrackList();renderPlayer();saveState();}
function nextTrack(){var tracks=currentPl().tracks;if(!tracks.length)return;var i=tracks.findIndex(function(t){return t.id===state.currentTrack;});state.currentTrack=(i>=tracks.length-1?tracks[0]:tracks[i+1]).id;renderTrackList();renderPlayer();saveState();}

function downloadTXT(){var lines=[];state.playlists.forEach(function(pl){lines.push('=== '+pl.name+' ===');pl.tracks.forEach(function(t,i){lines.push((i+1)+'. '+t.name);lines.push('   '+t.url);});lines.push('');});var blob=new Blob([lines.join('\n')],{type:'text/plain'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='playlists.txt';a.click();URL.revokeObjectURL(a.href);}
function downloadJSON(){var data=JSON.stringify({groupName:state.groupName,playlists:state.playlists},null,2);var blob=new Blob([data],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='playlists.json';a.click();URL.revokeObjectURL(a.href);}

loadState();render();applyWallpaper();
</script>
