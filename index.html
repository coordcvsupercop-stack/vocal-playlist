<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Playlist — Grupo Vocal</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: #e8e8e8;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 16px;
}

.wrapper {
  position: relative;
  border-radius: 14px;
  overflow: visible;
  width: 100%;
  max-width: 860px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.2);
}

/* Wallpaper — cobre TODO o wrapper incluindo sidebar */
.wallpaper {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  z-index: 0;
  border-radius: 14px;
  pointer-events: none;
}
.wallpaper-overlay {
  position: absolute;
  inset: 0;
  z-index: 1;
  border-radius: 14px;
  pointer-events: none;
}

.app {
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: 230px minmax(0,1fr);
  min-height: 600px;
  border: 0.5px solid rgba(0,0,0,0.12);
  border-radius: 14px;
  overflow: hidden; /* garante que filhos não vazem */
}

/* ── Sidebar ── */
.sidebar {
  display: flex;
  flex-direction: column;
  background: #f5f5f3;
  border-right: 0.5px solid #e0dfd8;
}
.sidebar-header {
  padding: 14px 16px;
  border-bottom: 0.5px solid #e0dfd8;
  display: flex; align-items: center;
  justify-content: space-between; gap: 8px;
  flex-shrink: 0;
}
.sidebar-title { font-size: 13px; font-weight: 600; color: #1a1a1a; }

/* scroll visível na lista de playlists */
.pl-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
  scrollbar-width: thin;
  scrollbar-color: #bbb #f0f0f0;
}
.pl-list::-webkit-scrollbar { width: 5px; }
.pl-list::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 4px; }
.pl-list::-webkit-scrollbar-thumb { background: #bbb; border-radius: 4px; }

/* ── Main ── */
.main {
  display: flex;
  flex-direction: column;
  background: #fff;
  min-height: 0; /* crucial para flex funcionar */
}
.main-header {
  padding: 14px 16px 10px;
  border-bottom: 0.5px solid #e8e8e8;
  flex-shrink: 0;
}
.header-top {
  display: flex; align-items: center;
  justify-content: space-between; gap: 8px; margin-bottom: 5px;
}
.group-name-disp {
  font-size: 17px; font-weight: 600; color: #1a1a1a;
  flex: 1; border-radius: 6px; padding: 2px 5px; margin: -2px -5px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.group-name-disp.editable { cursor: pointer; transition: background 0.1s; }
.group-name-disp.editable:hover { background: #f5f5f5; }
.group-name-input {
  font-size: 17px; font-weight: 600; color: #1a1a1a;
  border: none; background: #f5f5f5; outline: none;
  border-radius: 6px; padding: 2px 5px; width: 100%; font-family: inherit;
}
.pl-title-row { display: flex; align-items: center; gap: 6px; }
.pl-title-label { font-size: 11px; color: #aaa; flex-shrink: 0; }
.pl-title-disp {
  font-size: 12px; font-weight: 500; color: #888;
  flex: 1; border-radius: 4px; padding: 1px 4px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.pl-title-disp.editable { cursor: pointer; transition: background 0.1s; }
.pl-title-disp.editable:hover { background: #f5f5f5; color: #333; }
.pl-title-input {
  font-size: 12px; font-weight: 500; border: none;
  background: #f5f5f5; outline: none; border-radius: 4px;
  padding: 1px 4px; width: 100%; font-family: inherit; color: #333;
}
.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.header-menu-btn {
  background: none; border: 0.5px solid #ccc; cursor: pointer;
  font-size: 16px; padding: 3px 10px; border-radius: 7px; color: #888; line-height: 1;
}
.header-menu-btn:hover { background: #f5f5f5; }
.hamburger-btn {
  display: none; background: none; border: 0.5px solid #ccc; cursor: pointer;
  font-size: 18px; padding: 3px 9px; border-radius: 7px; color: #888; line-height: 1; flex-shrink: 0;
}
.hamburger-btn:hover { background: #f5f5f5; }
.visitor-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; background: #f0f7ff; color: #1a56aa;
  border: 0.5px solid #b8d4f5; border-radius: 20px; padding: 4px 10px; font-weight: 500;
}
.sync-status { font-size: 11px; padding: 2px 8px; border-radius: 20px; flex-shrink: 0; }
.sync-ok      { background: #EAF3DE; color: #27500A; }
.sync-saving  { background: #FAEEDA; color: #633806; }
.sync-error   { background: #FCEBEB; color: #A32D2D; }
.sync-loading { background: #E6F1FB; color: #0C447C; }

.add-area {
  padding: 10px 16px; border-bottom: 0.5px solid #e8e8e8;
  display: flex; gap: 7px; flex-shrink: 0;
}
.add-input {
  flex: 1; font-size: 12px; padding: 7px 10px;
  border: 0.5px solid #ccc; border-radius: 7px; outline: none; font-family: inherit; color: #333;
}
.add-input:focus { border-color: #888; }

/* scroll visível na lista de faixas */
.track-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 10px;
  min-height: 0; /* crucial */
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: #bbb #f5f5f5;
}
.track-list::-webkit-scrollbar { width: 5px; }
.track-list::-webkit-scrollbar-track { background: #f5f5f5; border-radius: 4px; }
.track-list::-webkit-scrollbar-thumb { background: #bbb; border-radius: 4px; }

.track {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 9px; border-radius: 8px; border: 0.5px solid transparent;
  margin-bottom: 3px; cursor: pointer; transition: background 0.1s;
}
.track:hover { background: #f7f7f5; }
.track.playing { background: #f0f0ee; border-color: #ddd; }
.track-num { font-size: 11px; color: #bbb; min-width: 18px; text-align: center; flex-shrink: 0; }
.track-icon {
  width: 28px; height: 28px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0;
}
.icon-yt    { background: #FCEBEB; color: #A32D2D; }
.icon-sp    { background: #EAF3DE; color: #27500A; }
.icon-other { background: #EEEDFE; color: #3C3489; }
.track-name {
  flex: 1; font-size: 13px; font-weight: 500; color: #1a1a1a;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.menu-btn {
  background: none; border: none; cursor: pointer;
  font-size: 15px; color: #ccc; padding: 2px 6px; border-radius: 6px; flex-shrink: 0; line-height: 1;
}
.menu-btn:hover { background: #eee; color: #555; }
.empty { text-align: center; padding: 40px 16px; color: #bbb; font-size: 12px; }

/* Player bar — sempre fixo */
.player-bar {
  padding: 10px 16px; border-top: 0.5px solid #e8e8e8;
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.now-info { flex: 1; overflow: hidden; min-width: 0; }
.now-playing { font-size: 11px; color: #aaa; }
.now-title { font-size: 12px; font-weight: 600; color: #1a1a1a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.ctrl-btn {
  font-size: 12px; padding: 6px 12px; border: 0.5px solid #ccc;
  border-radius: 7px; background: #f5f5f5; cursor: pointer; font-family: inherit; color: #333; white-space: nowrap;
}
.ctrl-btn:hover { background: #eee; }
.ctrl-btn.primary { background: #cc0000; color: #fff; border-color: #cc0000; font-weight: 500; }
.ctrl-btn.primary:hover { background: #aa0000; }

/* Itens de playlist */
.pl-item {
  padding: 7px 9px; border-radius: 8px; cursor: pointer;
  font-size: 12px; color: #666; display: flex; align-items: center; gap: 5px; margin-bottom: 2px; transition: background 0.1s;
}
.pl-item:hover { background: #fff; color: #1a1a1a; }
.pl-item.active { background: #fff; color: #1a1a1a; font-weight: 600; }
.pl-name-txt { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pl-count { font-size: 10px; color: #aaa; flex-shrink: 0; }
.pl-menu-btn {
  background: none; border: none; cursor: pointer;
  font-size: 14px; color: #bbb; padding: 1px 5px; border-radius: 5px; line-height: 1; opacity: 0; flex-shrink: 0;
}
.pl-item:hover .pl-menu-btn, .pl-item.active .pl-menu-btn { opacity: 1; }
.pl-menu-btn:hover { background: #eee; color: #555; }

.btn {
  font-size: 12px; padding: 6px 12px; border: 0.5px solid #ccc;
  border-radius: 7px; background: #fff; cursor: pointer; font-family: inherit; color: #333; white-space: nowrap;
}
.btn:hover { background: #f0f0f0; }

/* ── Player flutuante ── */
.yt-modal {
  display: none; position: absolute; inset: 0; z-index: 300;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.75); border-radius: 14px;
}
.yt-modal.open { display: flex; }
.yt-box { background: #0f0f0f; border-radius: 12px; overflow: hidden; width: 92%; max-width: 560px; }
.yt-box-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #1a1a1a; gap: 10px; }
.yt-box-title { font-size: 13px; font-weight: 500; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.yt-box-controls { display: flex; gap: 6px; flex-shrink: 0; }
.yt-ctrl { background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 12px; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-family: inherit; white-space: nowrap; }
.yt-ctrl:hover { background: rgba(255,255,255,0.2); }
.yt-ctrl.close-btn { background: #cc0000; }
.yt-ctrl.close-btn:hover { background: #aa0000; }
.yt-content { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.yt-open-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: #FF0000; color: #fff; font-size: 14px; font-weight: 600; padding: 12px 20px; border-radius: 8px; text-decoration: none; font-family: inherit; }
.yt-open-btn:hover { background: #cc0000; }
.yt-frame-wrap { width: 100%; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; background: #000; }
.yt-frame-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
.yt-sp-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: #1DB954; color: #fff; font-size: 14px; font-weight: 600; padding: 12px 20px; border-radius: 8px; text-decoration: none; font-family: inherit; }

/* ── Drawer mobile ── */
.sidebar-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 50; border-radius: 14px; }
.sidebar-overlay.open { display: block; }
.sidebar-drawer {
  position: absolute; top: 0; left: 0; bottom: 0;
  width: 75%; max-width: 280px; z-index: 51;
  transform: translateX(-100%); transition: transform 0.25s ease;
  display: flex; flex-direction: column;
  background: #f5f5f3; border-right: 0.5px solid #e0dfd8;
}
.sidebar-drawer.open { transform: translateX(0); }
.drawer-header {
  padding: 14px 16px; border-bottom: 0.5px solid #e0dfd8;
  display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-shrink: 0;
}
.drawer-close { background: none; border: none; cursor: pointer; font-size: 20px; color: #888; line-height: 1; padding: 2px 6px; }
.drawer-pl-list {
  flex: 1; overflow-y: auto; padding: 6px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin; scrollbar-color: #bbb #f0f0f0;
}
.drawer-pl-list::-webkit-scrollbar { width: 5px; }
.drawer-pl-list::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 4px; }
.drawer-pl-list::-webkit-scrollbar-thumb { background: #bbb; border-radius: 4px; }

/* ── Dropdown ── */
.dropdown {
  position: absolute; background: #fff; border: 0.5px solid #ddd;
  border-radius: 10px; z-index: 1000; min-width: 210px; padding: 4px; display: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
.dropdown.open { display: block; }
.dd-item { padding: 8px 12px; font-size: 13px; color: #1a1a1a; cursor: pointer; border-radius: 6px; display: flex; align-items: center; gap: 8px; }
.dd-item:hover { background: #f5f5f5; }
.dd-item.danger { color: #cc0000; }
.dd-item.danger:hover { background: #FEF2F2; }
.dd-sep { height: 0.5px; background: #eee; margin: 3px 0; }

/* ── Modal ── */
.modal-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.45); z-index: 500; align-items: center; justify-content: center; border-radius: 14px; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 12px; border: 0.5px solid #ddd; padding: 20px; width: 90%; max-width: 320px; display: flex; flex-direction: column; gap: 14px; box-shadow: 0 8px 40px rgba(0,0,0,0.18); }
.modal h3 { font-size: 15px; font-weight: 600; color: #1a1a1a; }
.modal input[type=text] { width: 100%; font-size: 13px; padding: 8px 10px; border: 0.5px solid #ccc; border-radius: 7px; outline: none; font-family: inherit; color: #1a1a1a; }
.modal input[type=text]:focus { border-color: #888; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.wp-panel { display: flex; flex-direction: column; gap: 12px; }
.wp-preview { width: 100%; height: 80px; border-radius: 8px; border: 0.5px solid #ddd; background: #e8e8e8; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #aaa; }
.wp-presets { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.wp-preset { height: 48px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; display: flex; align-items: flex-end; padding: 4px; transition: border-color 0.15s; background-size: cover; background-position: center; }
.wp-preset:hover { border-color: #888; }
.wp-preset.selected { border-color: #534AB7; }
.wp-preset-label { font-size: 9px; color: #fff; background: rgba(0,0,0,0.55); border-radius: 3px; padding: 1px 5px; }
.wp-upload-btn { width: 100%; font-size: 12px; padding: 8px; border: 0.5px solid #ccc; border-radius: 7px; background: #f5f5f5; cursor: pointer; font-family: inherit; color: #333; }
.wp-upload-btn:hover { background: #eee; }
.wp-remove { font-size: 12px; color: #cc0000; cursor: pointer; text-align: center; padding: 2px; }
.dim-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #666; }
.dim-row input[type=range] { flex: 1; }
.dim-note { font-size: 11px; color: #999; font-style: italic; }

/* ════════════════════════════
   HAS-BG — papel de parede
   Sidebar e main ficam semi-transparentes
   deixando a imagem aparecer
════════════════════════════ */
.has-bg .sidebar  { background: rgba(0,0,0,0.50) !important; border-right-color: rgba(255,255,255,0.12) !important; }
.has-bg .main     { background: rgba(0,0,0,0.38) !important; }
.has-bg .sidebar-header, .has-bg .main-header, .has-bg .add-area, .has-bg .player-bar { border-color: rgba(255,255,255,0.12) !important; }
.has-bg .sidebar-title, .has-bg .group-name-disp, .has-bg .track-name, .has-bg .now-title { color: #fff !important; }
.has-bg .pl-title-disp, .has-bg .pl-title-label { color: rgba(255,255,255,0.65) !important; }
.has-bg .pl-count, .has-bg .track-num, .has-bg .now-playing { color: rgba(255,255,255,0.5) !important; }
.has-bg .pl-item  { color: rgba(255,255,255,0.78); }
.has-bg .pl-item:hover, .has-bg .pl-item.active { background: rgba(255,255,255,0.15) !important; color: #fff !important; }
.has-bg .track:hover, .has-bg .track.playing { background: rgba(255,255,255,0.12) !important; border-color: rgba(255,255,255,0.22) !important; }
.has-bg .group-name-disp.editable:hover, .has-bg .pl-title-disp.editable:hover { background: rgba(255,255,255,0.12) !important; }
.has-bg .group-name-input, .has-bg .pl-title-input { background: rgba(255,255,255,0.15) !important; color: #fff !important; }
.has-bg .menu-btn, .has-bg .pl-menu-btn, .has-bg .header-menu-btn, .has-bg .hamburger-btn { color: rgba(255,255,255,0.65) !important; border-color: rgba(255,255,255,0.22) !important; }
.has-bg .menu-btn:hover, .has-bg .pl-menu-btn:hover, .has-bg .header-menu-btn:hover, .has-bg .hamburger-btn:hover { background: rgba(255,255,255,0.18) !important; color: #fff !important; }
.has-bg .add-input { background: rgba(255,255,255,0.12) !important; color: #fff !important; border-color: rgba(255,255,255,0.22) !important; }
.has-bg .add-input::placeholder { color: rgba(255,255,255,0.45) !important; }
.has-bg .btn, .has-bg .ctrl-btn { background: rgba(255,255,255,0.15) !important; color: #fff !important; border-color: rgba(255,255,255,0.28) !important; }
.has-bg .ctrl-btn.primary { background: #cc0000 !important; border-color: #cc0000 !important; }
.has-bg .empty    { color: rgba(255,255,255,0.45) !important; }
.has-bg .app      { border-color: rgba(255,255,255,0.18) !important; }
.has-bg .visitor-badge { background: rgba(255,255,255,0.18); color: #fff; border-color: rgba(255,255,255,0.35); }
.has-bg .sidebar-drawer  { background: rgba(0,0,0,0.85) !important; }
.has-bg .drawer-header   { border-color: rgba(255,255,255,0.12) !important; }
.has-bg .drawer-close    { color: rgba(255,255,255,0.7) !important; }
/* scrollbars no modo wallpaper */
.has-bg .pl-list { scrollbar-color: rgba(255,255,255,0.35) transparent !important; }
.has-bg .track-list { scrollbar-color: rgba(255,255,255,0.35) transparent !important; }
.has-bg .drawer-pl-list { scrollbar-color: rgba(255,255,255,0.35) transparent !important; }
.has-bg .pl-list::-webkit-scrollbar-track,
.has-bg .track-list::-webkit-scrollbar-track,
.has-bg .drawer-pl-list::-webkit-scrollbar-track { background: transparent; }
.has-bg .pl-list::-webkit-scrollbar-thumb,
.has-bg .track-list::-webkit-scrollbar-thumb,
.has-bg .drawer-pl-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.4); }

/* ════════════════════════════
   MOBILE RETRATO (≤ 640px)
════════════════════════════ */
@media (max-width: 640px) {
  body { padding: 0; background: #fff; min-height: 100dvh; align-items: flex-start; justify-content: flex-start; }
  .wrapper { border-radius: 0; max-width: 100%; box-shadow: none; min-height: 100dvh; display: flex; flex-direction: column; }
  .wallpaper, .wallpaper-overlay, .yt-modal, .sidebar-overlay, .modal-overlay { border-radius: 0; }
  .sidebar-drawer { border-radius: 0; height: 100dvh; }
  .app {
    grid-template-columns: 1fr;
    border-radius: 0; border: none;
    flex: 1;
    display: flex; flex-direction: column;
    min-height: 100dvh;
  }
  .sidebar { display: none; }
  .hamburger-btn { display: block; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .track-list { flex: 1; min-height: 0; overflow-y: auto; }
  .player-bar { flex-shrink: 0; }
}

/* ════════════════════════════
   MOBILE PAISAGEM
   Sidebar + Main lado a lado, tudo em 100dvh
════════════════════════════ */
@media (max-width: 900px) and (orientation: landscape) and (max-height: 500px) {
  body { padding: 0; background: #fff; min-height: 100dvh; align-items: stretch; justify-content: flex-start; }
  .wrapper { border-radius: 0; max-width: 100%; box-shadow: none; height: 100dvh; overflow: hidden; }
  .wallpaper, .wallpaper-overlay, .yt-modal, .sidebar-overlay, .modal-overlay { border-radius: 0; }
  .sidebar-drawer { border-radius: 0; height: 100dvh; }

  .app {
    grid-template-columns: 170px minmax(0,1fr);
    border-radius: 0; border: none;
    height: 100dvh;
    overflow: hidden;
  }

  /* Sidebar compacta com scroll visível */
  .sidebar {
    display: flex;
    height: 100dvh;
    overflow: hidden;
  }
  .sidebar-header { padding: 8px 10px; flex-shrink: 0; }
  .sidebar-title { font-size: 11px; }
  .btn { font-size: 11px; padding: 4px 8px; }
  .pl-item { padding: 5px 7px; font-size: 11px; margin-bottom: 1px; }
  .pl-list {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    /* scroll sempre visível no paisagem */
    scrollbar-width: thin;
    scrollbar-color: #bbb #f0f0f0;
  }
  .pl-list::-webkit-scrollbar { width: 5px; }
  .pl-list::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 4px; }
  .pl-list::-webkit-scrollbar-thumb { background: #bbb; border-radius: 4px; }

  .hamburger-btn { display: none; }

  /* Main ocupa altura total com flex */
  .main {
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .main-header { padding: 7px 12px 5px; flex-shrink: 0; }
  .group-name-disp, .group-name-input { font-size: 13px; }
  .pl-title-label { font-size: 10px; }
  .pl-title-disp { font-size: 11px; }

  .add-area { padding: 5px 12px; flex-shrink: 0; }
  .add-input { padding: 5px 8px; font-size: 11px; }

  /* Lista de faixas — scroll VISÍVEL, ocupa espaço disponível */
  .track-list {
    flex: 1;
    min-height: 0; /* CRUCIAL */
    overflow-y: auto;
    padding: 4px 8px;
    /* barra de scroll sempre visível */
    scrollbar-width: thin;
    scrollbar-color: #bbb #f5f5f5;
  }
  .track-list::-webkit-scrollbar { width: 5px; }
  .track-list::-webkit-scrollbar-track { background: #f5f5f5; border-radius: 4px; }
  .track-list::-webkit-scrollbar-thumb { background: #bbb; border-radius: 4px; }
  .track { padding: 5px 7px; margin-bottom: 2px; }
  .track-name { font-size: 11px; }
  .track-icon { width: 24px; height: 24px; font-size: 10px; }

  /* Player bar compacto mas sempre visível */
  .player-bar {
    flex-shrink: 0;
    padding: 5px 12px;
    gap: 8px;
  }
  .now-playing { font-size: 10px; }
  .now-title { font-size: 11px; }
  .ctrl-btn { font-size: 11px; padding: 5px 9px; }

  /* scrollbars no paisagem com wallpaper */
  .has-bg .pl-list::-webkit-scrollbar-track,
  .has-bg .track-list::-webkit-scrollbar-track { background: transparent; }
  .has-bg .pl-list::-webkit-scrollbar-thumb,
  .has-bg .track-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.45); }
}

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyB3Mjgj282M8dKsqCwVuZAAK1zQOwGGjMc",
  authDomain: "vocal-maanaim.firebaseapp.com",
  projectId: "vocal-maanaim",
  storageBucket: "vocal-maanaim.firebasestorage.app",
  messagingSenderId: "870558929959",
  appId: "1:870558929959:web:fcbfe969afe5a3c767ea02"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const DOC_REF = doc(db,'app','state');

var ADMIN_PASSWORD='maanaim2024';
var isAdmin=(function(){var p=new URLSearchParams(window.location.search);return p.get('admin')===ADMIN_PASSWORD;})();
var state={groupName:'Grupo Vocal Maanaim',playlists:[{id:1,name:'Playlist 1',tracks:[]}],currentPl:1,currentTrack:null,nextId:10,wallpaper:null,wallpaperDim:40};
var presets=[{label:'Coral',color:'linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)'},{label:'Palco',color:'linear-gradient(135deg,#2d1b4e,#1a1a2e,#4a1942)'},{label:'Noturno',color:'linear-gradient(135deg,#0d1117,#1c2333,#0d1117)'},{label:'Aurora',color:'linear-gradient(135deg,#003366,#004e92,#000428)'},{label:'Veludo',color:'linear-gradient(135deg,#1a0a2e,#3d1c52,#1a0a2e)'},{label:'Crepusc.',color:'linear-gradient(135deg,#2c1810,#8b3a1c,#2c1810)'}];
var selectedPreset=null,tempWpData=null,tempDim=null,saveTimer=null;

function getYTId(u){if(!u)return null;var m=u.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:null;}
function getType(u){if(!u)return'other';if(u.includes('youtube.com')||u.includes('youtu.be'))return'yt';if(u.includes('spotify.com'))return'sp';return'other';}
function typeIcon(t){return t==='yt'?'▶':t==='sp'?'♪':'♬';}
function typeLabel(t){return t==='yt'?'YouTube':t==='sp'?'Spotify':'Link';}
function currentPl(){return state.playlists.find(function(p){return p.id===state.currentPl;})||state.playlists[0];}
function setSyncStatus(c,m){var el=document.querySelector('.sync-status');if(el){el.className='sync-status '+c;el.textContent=m;}}
function scheduleSave(){if(!isAdmin)return;setSyncStatus('sync-saving','⏳ Salvando...');if(saveTimer)clearTimeout(saveTimer);saveTimer=setTimeout(function(){var d={groupName:state.groupName,playlists:state.playlists,nextId:state.nextId,wallpaper:state.wallpaper,wallpaperDim:state.wallpaperDim};setDoc(DOC_REF,d).then(function(){setSyncStatus('sync-ok','✓ Salvo');}).catch(function(){setSyncStatus('sync-error','✕ Erro');});},800);}

onSnapshot(DOC_REF,function(snap){
  if(!snap.exists())return;
  var d=snap.data();
  state.groupName=d.groupName||state.groupName;
  state.playlists=d.playlists||state.playlists;
  state.nextId=d.nextId||state.nextId;
  state.wallpaper=d.wallpaper!==undefined?d.wallpaper:state.wallpaper;
  state.wallpaperDim=d.wallpaperDim!==undefined?d.wallpaperDim:state.wallpaperDim;
  var ok=state.playlists.find(function(p){return p.id===state.currentPl;});
  if(!ok)state.currentPl=state.playlists[0]?state.playlists[0].id:1;
  render();applyWallpaper();
  if(isAdmin)setSyncStatus('sync-ok','✓ Salvo');
});

function openDrawer(){document.getElementById('sidebarOverlay').classList.add('open');document.getElementById('sidebarDrawer').classList.add('open');}
function closeDrawer(){document.getElementById('sidebarOverlay').classList.remove('open');document.getElementById('sidebarDrawer').classList.remove('open');}
window.openDrawer=openDrawer;window.closeDrawer=closeDrawer;

function applyMode(){
  document.getElementById('btnNovaPl').style.display=isAdmin?'':'none';
  document.getElementById('btnNovaPlDrawer').style.display=isAdmin?'':'none';
  document.getElementById('addArea').style.display=isAdmin?'':'none';
  var gnd=document.getElementById('groupNameDisp');
  if(isAdmin){gnd.classList.add('editable');gnd.title='Clique para editar';gnd.onclick=startEditGroup;}
  else{gnd.classList.remove('editable');gnd.onclick=null;}
  var ptd=document.getElementById('plTitleDisp');
  if(isAdmin){ptd.classList.add('editable');ptd.title='Clique para editar';ptd.onclick=startEditPl;}
  else{ptd.classList.remove('editable');ptd.onclick=null;}
  var hr=document.getElementById('headerRight');
  if(isAdmin){hr.innerHTML='<span class="sync-status sync-loading" style="margin-right:4px">⏳</span><button class="header-menu-btn" onclick="openAppMenu(event)">···</button>';}
  else{hr.innerHTML='<span class="visitor-badge">👁 Visualização</span>';}
}

function applyWallpaper(){
  var wp=document.getElementById('wallpaper');
  var ov=document.getElementById('wallpaperOverlay');
  var app=document.getElementById('app');
  if(!state.wallpaper){
    wp.style.cssText='position:absolute;inset:0;z-index:0;border-radius:inherit;pointer-events:none;background:none';
    ov.style.cssText='position:absolute;inset:0;z-index:1;border-radius:inherit;pointer-events:none;background:none';
    app.classList.remove('has-bg');
    return;
  }
  /* Aplica a imagem/gradiente no wallpaper */
  if(state.wallpaper.startsWith('linear-gradient')){
    wp.style.cssText='position:absolute;inset:0;z-index:0;border-radius:inherit;pointer-events:none;'+
      'background:'+state.wallpaper+';background-size:cover;background-position:center;background-repeat:no-repeat';
  } else {
    wp.style.cssText='position:absolute;inset:0;z-index:0;border-radius:inherit;pointer-events:none;'+
      'background-image:url("'+state.wallpaper+'");background-size:cover;background-position:center;background-repeat:no-repeat';
  }
  /* Overlay de escurecimento */
  var alpha=state.wallpaperDim/100;
  ov.style.cssText='position:absolute;inset:0;z-index:1;border-radius:inherit;pointer-events:none;background:rgba(0,0,0,'+alpha+')';
  app.classList.add('has-bg');
}
window.applyWallpaper=applyWallpaper;

function openPlayer(){var t=currentPl().tracks;if(!t.length)return;if(!state.currentTrack)state.currentTrack=t[0].id;loadPlayerTrack();document.getElementById('ytModal').classList.add('open');}
function closePlayer(){document.getElementById('ytModal').classList.remove('open');document.getElementById('ytContent').innerHTML='';}
function loadPlayerTrack(){
  var t=currentPl().tracks.find(function(t){return t.id===state.currentTrack;});if(!t)return;
  document.getElementById('ytBoxTitle').textContent=t.name;renderTrackList();renderPlayer();
  var id=getYTId(t.url);var c=document.getElementById('ytContent');
  if(id){c.innerHTML='<a class="yt-open-btn" href="https://www.youtube.com/watch?v='+id+'" target="_blank">▶ Abrir no YouTube</a><div class="yt-frame-wrap"><iframe src="https://www.youtube.com/embed/'+id+'?autoplay=1&rel=0&modestbranding=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe></div>';}
  else if(t.url.includes('spotify.com')){c.innerHTML='<a class="yt-sp-btn" href="'+t.url+'" target="_blank">♪ Abrir no Spotify</a>';}
  else{c.innerHTML='<a class="yt-open-btn" href="'+t.url+'" target="_blank">↗ Abrir link</a>';}
}
function prevTrackPlayer(){var t=currentPl().tracks;if(!t.length)return;var i=t.findIndex(function(x){return x.id===state.currentTrack;});state.currentTrack=(i<=0?t[t.length-1]:t[i-1]).id;loadPlayerTrack();}
function nextTrackPlayer(){var t=currentPl().tracks;if(!t.length)return;var i=t.findIndex(function(x){return x.id===state.currentTrack;});state.currentTrack=(i>=t.length-1?t[0]:t[i+1]).id;loadPlayerTrack();}
window.openPlayer=openPlayer;window.closePlayer=closePlayer;window.prevTrackPlayer=prevTrackPlayer;window.nextTrackPlayer=nextTrackPlayer;

function startEditGroup(){if(!isAdmin)return;var w=document.getElementById('groupNameWrap');w.innerHTML='<input class="group-name-input" id="groupInput" value="'+state.groupName.replace(/"/g,'&quot;')+'" onblur="saveGroup()" onkeydown="if(event.key===\'Enter\')this.blur();if(event.key===\'Escape\')cancelEditGroup()">';var i=document.getElementById('groupInput');i.focus();i.select();}
function saveGroup(){var i=document.getElementById('groupInput');if(i&&i.value.trim())state.groupName=i.value.trim();cancelEditGroup();scheduleSave();}
function cancelEditGroup(){var w=document.getElementById('groupNameWrap');var c='group-name-disp'+(isAdmin?' editable':'');var o=isAdmin?' onclick="startEditGroup()" title="Clique para editar"':'';w.innerHTML='<div class="'+c+'" id="groupNameDisp"'+o+'>'+state.groupName+'</div>';}
function startEditPl(){if(!isAdmin)return;var pl=currentPl();var w=document.getElementById('plTitleWrap');w.innerHTML='<input class="pl-title-input" id="plInput" value="'+pl.name.replace(/"/g,'&quot;')+'" onblur="savePl()" onkeydown="if(event.key===\'Enter\')this.blur();if(event.key===\'Escape\')cancelEditPl()">';var i=document.getElementById('plInput');i.focus();i.select();}
function savePl(){var i=document.getElementById('plInput');if(i&&i.value.trim()){currentPl().name=i.value.trim();renderSidebar();}cancelEditPl();scheduleSave();}
function cancelEditPl(){var w=document.getElementById('plTitleWrap');var c='pl-title-disp'+(isAdmin?' editable':'');var o=isAdmin?' onclick="startEditPl()" title="Clique para editar"':'';w.innerHTML='<div class="'+c+'" id="plTitleDisp"'+o+'>'+currentPl().name+'</div>';}
window.startEditGroup=startEditGroup;window.saveGroup=saveGroup;window.cancelEditGroup=cancelEditGroup;
window.startEditPl=startEditPl;window.savePl=savePl;window.cancelEditPl=cancelEditPl;

function showModal(title,val,cb){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML='<input type="text" id="mInput" value="'+val.replace(/"/g,'&quot;')+'" placeholder="'+title+'">';
  document.getElementById('modalBtns').innerHTML='<button class="btn" onclick="closeModal()">Cancelar</button><button class="btn" style="background:#1a1a1a;color:#fff;border-color:#1a1a1a" id="mBtn">Confirmar</button>';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(function(){var inp=document.getElementById('mInput');var btn=document.getElementById('mBtn');if(!inp||!btn)return;inp.focus();inp.select();var ok=function(){var v=inp.value.trim();if(!v)return;closeModal();cb(v);};btn.onclick=ok;inp.onkeydown=function(e){if(e.key==='Enter')ok();if(e.key==='Escape')closeModal();};},60);
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');document.getElementById('modalBody').innerHTML='';document.getElementById('modalBtns').innerHTML='';}
window.closeModal=closeModal;

function openNewPl(){if(!isAdmin)return;showModal('Nova playlist','',function(v){var id=++state.nextId;state.playlists.push({id:id,name:v,tracks:[]});state.currentPl=id;render();scheduleSave();});}
window.openNewPl=openNewPl;

function openMenu(e,items){if(!isAdmin)return;e.stopPropagation();var dd=document.getElementById('dropdown');dd.innerHTML=items.map(function(it){return it==='sep'?'<div class="dd-sep"></div>':'<div class="dd-item'+(it.danger?' danger':'')+'" onclick="'+it.fn+'">'+it.icon+' '+it.label+'</div>';}).join('');dd.classList.add('open');var wR=document.getElementById('wrapper').getBoundingClientRect(),bR=e.currentTarget.getBoundingClientRect();var top=bR.bottom-wR.top+4,left=bR.right-wR.left-214;if(left<8)left=8;dd.style.top=top+'px';dd.style.left=left+'px';requestAnimationFrame(function(){var dW=dd.offsetWidth;var l=bR.right-wR.left-dW;if(l<8)l=8;if(l+dW>wR.width-8)l=wR.width-dW-8;dd.style.left=l+'px';});}
function closeMenu(){document.getElementById('dropdown').classList.remove('open');}
document.addEventListener('click',function(e){var dd=document.getElementById('dropdown');if(dd&&dd.classList.contains('open')&&!dd.contains(e.target))closeMenu();});
window.openMenu=openMenu;window.closeMenu=closeMenu;

function openAppMenu(e){if(!isAdmin)return;var hw=!!state.wallpaper;var it=[{icon:'🖼',label:'Papel de parede',fn:'closeMenu();openWpModal()'}];if(hw){it.push('sep');it.push({icon:'✕',label:'Remover fundo',danger:true,fn:'closeMenu();removeBg()'});}it.push('sep');it.push({icon:'↓',label:'Exportar (.txt)',fn:'closeMenu();downloadTXT()'});it.push({icon:'↓',label:'Exportar (.json)',fn:'closeMenu();downloadJSON()'});openMenu(e,it);}
window.openAppMenu=openAppMenu;
function openPlMenu(e,id){if(!isAdmin)return;e.stopPropagation();openMenu(e,[{icon:'✏',label:'Renomear',fn:'closeMenu();renamePl('+id+')'},{icon:'↑',label:'Mover para cima',fn:'closeMenu();movePl('+id+',-1)'},{icon:'↓',label:'Mover para baixo',fn:'closeMenu();movePl('+id+',1)'},'sep',{icon:'✕',label:'Excluir',danger:true,fn:'closeMenu();deletePl('+id+')'}]);}
function openTrackMenu(e,id){if(!isAdmin)return;e.stopPropagation();openMenu(e,[{icon:'✏',label:'Renomear faixa',fn:'closeMenu();renameTrack('+id+')'},{icon:'↑',label:'Mover para cima',fn:'closeMenu();moveTrack('+id+',-1)'},{icon:'↓',label:'Mover para baixo',fn:'closeMenu();moveTrack('+id+',1)'},'sep',{icon:'✕',label:'Remover',danger:true,fn:'closeMenu();deleteTrack('+id+')'}]);}
window.openPlMenu=openPlMenu;window.openTrackMenu=openTrackMenu;
function renamePl(id){var pl=state.playlists.find(function(p){return p.id===id;});if(!pl)return;showModal('Renomear playlist',pl.name,function(v){pl.name=v;render();scheduleSave();});}
function renameTrack(id){var t=currentPl().tracks.find(function(t){return t.id===id;});if(!t)return;showModal('Renomear faixa',t.name,function(v){t.name=v;renderTrackList();scheduleSave();});}
window.renamePl=renamePl;window.renameTrack=renameTrack;

function openWpModal(){if(!isAdmin)return;selectedPreset=null;tempWpData=state.wallpaper;tempDim=state.wallpaperDim;document.getElementById('modalTitle').textContent='Papel de parede';document.getElementById('modalBtns').innerHTML='<button class="btn" onclick="closeModal()">Cancelar</button><button class="btn" style="background:#1a1a1a;color:#fff;border-color:#1a1a1a" onclick="applyWpModal()">Aplicar</button>';var ps='';if(state.wallpaper){ps=state.wallpaper.startsWith('linear-gradient')?'background:'+state.wallpaper+';background-size:cover;background-position:center':'background-image:url("'+state.wallpaper+'");background-size:cover;background-position:center';}document.getElementById('modalBody').innerHTML='<div class="wp-panel"><div class="wp-preview" id="wpPreview" style="'+ps+'">'+(state.wallpaper?'':'Nenhuma imagem selecionada')+'</div><div class="dim-row"><span>Escurecimento</span><input type="range" id="dimSlider" min="0" max="85" step="5" value="'+tempDim+'" oninput="updateDimPreview(this.value)"><span id="dimVal">'+tempDim+'%</span></div><p class="dim-note">0% = original · 85% = escuro</p><div style="font-size:11px;color:#888;margin-top:4px">Temas prontos</div><div class="wp-presets" id="wpPresets"></div><button class="wp-upload-btn" onclick="document.getElementById(\'fileInput\').click()">📁 Foto do grupo</button>'+(state.wallpaper?'<div class="wp-remove" onclick="removeBg()">✕ Remover</div>':'')+'</div>';renderPresets();document.getElementById('modalOverlay').classList.add('open');}
function renderPresets(){var el=document.getElementById('wpPresets');if(!el)return;el.innerHTML=presets.map(function(p,i){return'<div class="wp-preset'+(selectedPreset===i?' selected':'')+'" style="background:'+p.color+'" onclick="selectPreset('+i+')"><span class="wp-preset-label">'+p.label+'</span></div>';}).join('');}
function selectPreset(i){selectedPreset=i;tempWpData=presets[i].color;var p=document.getElementById('wpPreview');if(p){p.style.cssText='background:'+presets[i].color+';background-size:cover;background-position:center';p.textContent='';}renderPresets();}
function updateDimPreview(v){tempDim=parseInt(v);document.getElementById('dimVal').textContent=v+'%';}
function handleFileUpload(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){tempWpData=ev.target.result;selectedPreset=null;var p=document.getElementById('wpPreview');if(p){p.style.cssText='background-image:url("'+tempWpData+'");background-size:cover;background-position:center';p.textContent='';}renderPresets();};r.readAsDataURL(f);e.target.value='';}
function removeBg(){state.wallpaper=null;state.wallpaperDim=40;applyWallpaper();scheduleSave();closeModal();}
function applyWpModal(){if(tempWpData!==null)state.wallpaper=tempWpData;state.wallpaperDim=tempDim!==null?tempDim:state.wallpaperDim;applyWallpaper();scheduleSave();closeModal();}
window.openWpModal=openWpModal;window.selectPreset=selectPreset;window.updateDimPreview=updateDimPreview;
window.handleFileUpload=handleFileUpload;window.removeBg=removeBg;window.applyWpModal=applyWpModal;

function movePl(id,d){if(!isAdmin)return;var a=state.playlists,i=a.findIndex(function(p){return p.id===id;}),j=i+d;if(j<0||j>=a.length)return;var t=a[i];a[i]=a[j];a[j]=t;render();scheduleSave();}
function deletePl(id){if(!isAdmin)return;if(state.playlists.length===1)return;state.playlists=state.playlists.filter(function(p){return p.id!==id;});if(state.currentPl===id)state.currentPl=state.playlists[0].id;render();scheduleSave();}
function moveTrack(id,d){if(!isAdmin)return;var t=currentPl().tracks,i=t.findIndex(function(x){return x.id===id;}),j=i+d;if(j<0||j>=t.length)return;var tmp=t[i];t[i]=t[j];t[j]=tmp;renderTrackList();scheduleSave();}
function deleteTrack(id){if(!isAdmin)return;var pl=currentPl();pl.tracks=pl.tracks.filter(function(t){return t.id!==id;});if(state.currentTrack===id)state.currentTrack=null;renderTrackList();renderPlayer();scheduleSave();}
function addTrack(){if(!isAdmin)return;var inp=document.getElementById('urlInput');var url=inp.value.trim();if(!url)return;var tp=getType(url);var nm=tp==='yt'?'Musica do YouTube':tp==='sp'?'Faixa do Spotify':'Faixa';currentPl().tracks.push({id:++state.nextId,name:nm,url:url});inp.value='';renderTrackList();renderSidebar();scheduleSave();}
window.movePl=movePl;window.deletePl=deletePl;window.moveTrack=moveTrack;window.deleteTrack=deleteTrack;window.addTrack=addTrack;

function renderSidebarContent(lid){var el=document.getElementById(lid);if(!el)return;el.innerHTML=state.playlists.map(function(p){var mb=isAdmin?'<button class="pl-menu-btn" onclick="event.stopPropagation();openPlMenu(event,'+p.id+')">···</button>':'';return'<div class="pl-item'+(p.id===state.currentPl?' active':'')+'" onclick="selectPl('+p.id+')"><span class="pl-name-txt">'+p.name+'</span><span class="pl-count">'+p.tracks.length+'</span>'+mb+'</div>';}).join('');}
function renderSidebar(){renderSidebarContent('plList');renderSidebarContent('plListDrawer');}
function renderTrackList(){var pl=currentPl();var tl=document.getElementById('trackList');if(!pl||!pl.tracks.length){tl.innerHTML='<div class="empty">'+(isAdmin?'Cole um link acima para adicionar faixas.':'Nenhuma faixa nesta playlist ainda.')+'</div>';return;}tl.innerHTML=pl.tracks.map(function(t,i){var tp=getType(t.url);var mb=isAdmin?'<button class="menu-btn" onclick="event.stopPropagation();openTrackMenu(event,'+t.id+')">···</button>':'';return'<div class="track'+(state.currentTrack===t.id?' playing':'')+'" onclick="selectTrack('+t.id+')"><span class="track-num">'+(i+1)+'</span><div class="track-icon icon-'+tp+'">'+typeIcon(tp)+'</div><span class="track-name">'+t.name+'</span>'+mb+'</div>';}).join('');}
function renderPlayer(){var t=currentPl()&&currentPl().tracks.find(function(t){return t.id===state.currentTrack;});var np=document.getElementById('nowPlaying'),nt=document.getElementById('nowTitle');if(t){np.textContent='Selecionada: '+typeLabel(getType(t.url));nt.textContent=t.name;nt.style.display='block';}else{np.textContent='Selecione uma faixa';nt.style.display='none';}}
function render(){renderSidebar();cancelEditGroup();cancelEditPl();renderTrackList();renderPlayer();applyMode();}
function selectPl(id){state.currentPl=id;state.currentTrack=null;closePlayer();closeDrawer();render();}
function selectTrack(id){state.currentTrack=id;renderTrackList();renderPlayer();}
function prevTrack(){var t=currentPl().tracks;if(!t.length)return;var i=t.findIndex(function(x){return x.id===state.currentTrack;});state.currentTrack=(i<=0?t[t.length-1]:t[i-1]).id;renderTrackList();renderPlayer();}
function nextTrack(){var t=currentPl().tracks;if(!t.length)return;var i=t.findIndex(function(x){return x.id===state.currentTrack;});state.currentTrack=(i>=t.length-1?t[0]:t[i+1]).id;renderTrackList();renderPlayer();}
window.selectPl=selectPl;window.selectTrack=selectTrack;window.prevTrack=prevTrack;window.nextTrack=nextTrack;

function downloadTXT(){var l=[];state.playlists.forEach(function(pl){l.push('=== '+pl.name+' ===');pl.tracks.forEach(function(t,i){l.push((i+1)+'. '+t.name);l.push('   '+t.url);});l.push('');});var b=new Blob([l.join('\n')],{type:'text/plain'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='playlists.txt';a.click();URL.revokeObjectURL(a.href);}
function downloadJSON(){var d=JSON.stringify({groupName:state.groupName,playlists:state.playlists},null,2);var b=new Blob([d],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='playlists.json';a.click();URL.revokeObjectURL(a.href);}
window.downloadTXT=downloadTXT;window.downloadJSON=downloadJSON;

render();applyWallpaper();
</script>
</body>
